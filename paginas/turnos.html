<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turnos - Veterinaria Alem</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>

<body class="turnos">

  <!-- HEADER -->
  <header class="turnos-header">
    <a href="../index.html" class="back-btn">←</a>
  </header>

  <!-- HERO / TITULO -->
  <section class="turnos-hero">
    <h1 class="turnos-title">Reservar turno</h1>
    <p class="turnos-subtitle">Elige una fecha</p>
  </section>

  <!-- FECHAS -->
  <section class="turnos-fechas">

    <!-- MESES -->
    <div class="turnos-meses">
      <span>Abril</span>
      <span>Mayo</span>
      <span class="active">Junio</span>
      <span>Julio</span>
      <span>Agosto</span>
      <span>Septiembre</span>
    </div>

    <!-- DIAS -->
    <div class="turnos-dias">
      <div class="dia">
        <span>12</span>
        <small>lun</small>
      </div>

      <div class="dia active">
        <span>13</span>
        <small>mar</small>
      </div>

      <div class="dia">
        <span>14</span>
        <small>mie</small>
      </div>

      <div class="dia">
        <span>15</span>
        <small>jue</small>
      </div>

      <div class="dia">
        <span>16</span>
        <small>vie</small>
      </div>

      <div class="dia">
        <span>17</span>
        <small>sab</small>
      </div>

    </div>

  </section>

  <!-- HORARIOS -->
  <section class="turnos-horarios">

    <h3>Elige un horario</h3>

    <div class="horarios-grid">

      <button class="hora">10:00</button>
      <button class="hora active">12:00</button>
      <button class="hora disabled">14:00</button>
      <button class="hora disabled">16:00</button>

      <button class="hora">10:30</button>
      <button class="hora">12:30</button>
      <button class="hora active">14:30</button>
      <button class="hora active">16:30</button>

      <button class="hora active">11:00</button>
      <button class="hora">13:00</button>
      <button class="hora">15:00</button>
      <button class="hora">17:00</button>

      <button class="hora active">11:30</button>
      <button class="hora disabled">13:30</button>
      <button class="hora active">15:30</button>
      <button class="hora active">17:30</button>

    </div>

    <!-- CTA -->
    <button class="btn-confirmar">Confirmar turno</button>

  </section>

  <!-- NAV BOTTOM -->
  
  <!-- NAV BOTTOM (tipo app) -->
  <nav class="bottom-nav visible">
    <a href="../index.html"> <img src="../assets/icons/home-icon.png" alt=""></a>
    <a href="../paginas/turnos.html"><img src="../assets/icons/turnos-icon.png"></a>
    <a href="../paginas/perfil.html"><img src="../assets/icons/perfil-icon.png"></a>
    <a href="../paginas/cupones.html"><img src="../assets/icons/cupones-icon.png"></a>
  </nav>

</body>
</html>
